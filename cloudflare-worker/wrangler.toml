name            = "whatsapp-cert-bot"
main            = "worker.js"
compatibility_date = "2024-09-23"

# ── R2 bucket binding ─────────────────────────────────────────────────
# "CERTIFICATES" is how the worker accesses it via env.CERTIFICATES
[[r2_buckets]]
binding     = "CERTIFICATES"
bucket_name = "certificates"

# ── D1 database for analytics ─────────────────────────────────────────
# Run once: wrangler d1 create wa-bot-analytics
# Then paste the database_id below.
[[d1_databases]]
binding       = "DB"
database_name = "wa-bot-analytics"
database_id   = "aa02f81f-9d11-4bef-b17f-6f246395dfaa"

# ── Non-secret variables only go in this file ─────────────────────────
# Secret: run `wrangler secret put ANALYTICS_TOKEN` to set the dashboard password.

[vars]
R2_PUBLIC_URL = "https://pub-3e00f49622064202a04c19fb33ee2976.r2.dev"
API_URL       = "https://api.cephlow.online"

# ── Talk-to-Developer support bridge (non-secret) ────────────────────
TG_SUPERGROUP_ID = "-1003610434523"
SUPABASE_URL     = "https://elvhmjtrcfvgumayqarp.supabase.co"

# Secrets — set via:
#   wrangler secret put TG_BOT_TOKEN
#   wrangler secret put SUPABASE_KEY
#   wrangler secret put ANALYTICS_TOKEN
