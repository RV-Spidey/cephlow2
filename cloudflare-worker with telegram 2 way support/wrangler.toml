name            = "whatsapp-cert-bot"
main            = "worker.js"
compatibility_date = "2024-09-23"

# ── R2 bucket binding ─────────────────────────────────────────────────
# "CERTIFICATES" is how the worker accesses it via env.CERTIFICATES
[[r2_buckets]]
binding     = "CERTIFICATES"
bucket_name = "certificates"

# ── Non-secret variables only go in this file ─────────────────────────

[vars]
R2_PUBLIC_URL = "https://pub-3e00f49622064202a04c19fb33ee2976.r2.dev"
API_URL       = "https://certificate-api-imks.onrender.com"

# ── Support bridge (non-secret) ───────────────────────────────────────
TG_SUPERGROUP_ID = "-1003610434523"
SUPABASE_URL     = "https://elvhmjtrcfvgumayqarp.supabase.co"

